<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f0a882"/>
      <stop offset="100%" stop-color="#c4714a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a882" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c4714a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow -->
  <circle cx="50" cy="50" r="50" fill="url(#glow)"/>

  <!-- Circle background -->
  <circle cx="50" cy="50" r="46" fill="url(#bg)"/>

  <!-- Brain-heart shape: two heart lobes at top + brain wrinkles -->
  <!-- Left lobe -->
  <path d="M50 38 C50 38 36 28 34 35 C32 41 38 46 50 55" 
        fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <!-- Right lobe -->
  <path d="M50 38 C50 38 64 28 66 35 C68 41 62 46 50 55" 
        fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <!-- Bottom heart point -->
  <path d="M50 55 L50 65" 
        fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round" opacity="0.95"/>

  <!-- Brain wrinkles left -->
  <path d="M38 38 C36 41 37 44 40 44" 
        fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M36 45 C35 48 37 51 40 50" 
        fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Brain wrinkles right -->
  <path d="M62 38 C64 41 63 44 60 44" 
        fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M64 45 C65 48 63 51 60 50" 
        fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Center dividing line (brain sulcus) -->
  <path d="M50 38 L50 55" 
        fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

  <!-- Small heart pulse at bottom -->
  <path d="M44 70 L47 67 L50 72 L53 63 L56 70" 
        fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
</svg>
